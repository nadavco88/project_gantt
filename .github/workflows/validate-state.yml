name: Validate gantt-state.json

on:
  push:
    paths:
      - 'data/gantt-state.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check file size
        run: |
          MAX_BYTES=1572864  # 1.5 MB
          FILE="data/gantt-state.json"
          SIZE=$(stat --printf="%s" "$FILE")
          echo "File size: $SIZE bytes (max $MAX_BYTES)"
          if [ "$SIZE" -gt "$MAX_BYTES" ]; then
            echo "::error::gantt-state.json exceeds 1.5 MB ($SIZE bytes)"
            exit 1
          fi

      - name: Validate JSON structure
        run: |
          FILE="data/gantt-state.json"
          python3 - <<'PY'
          import json, sys
          try:
              data = json.load(open("data/gantt-state.json"))
          except json.JSONDecodeError as e:
              print(f"::error::Invalid JSON: {e}")
              sys.exit(1)

          errors = []
          if not isinstance(data, dict):
              errors.append("Root must be an object")
          else:
              if "projects" not in data or not isinstance(data.get("projects"), list):
                  errors.append("'projects' must be an array")
              if "users" in data and not isinstance(data["users"], list):
                  errors.append("'users' must be an array if present")
              # Verify each project has required fields
              for i, p in enumerate(data.get("projects", [])):
                  if not isinstance(p, dict):
                      errors.append(f"projects[{i}] is not an object")
                  elif "id" not in p or "name" not in p:
                      errors.append(f"projects[{i}] missing 'id' or 'name'")
              # Check for script-tag injection
              raw = json.dumps(data)
              if "<script" in raw.lower():
                  errors.append("Payload contains forbidden <script> tag")

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)

          print("gantt-state.json is valid")
          PY
